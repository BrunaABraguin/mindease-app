# https://github.com/firebase/firebase-tools


name: Deploy to Firebase Hosting on PR
on: pull_request

jobs:
  prepare_env:
    permissions:
      contents: read
      pull-requests: write
      checks: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create and upload env file
        uses: ./.github/actions/create-env

  test_and_quality:
    runs-on: ubuntu-latest
    needs: prepare_env
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Download env artifact
        uses: actions/download-artifact@v4
        with:
          name: env
      - name: Run Flutter tests and coverage analysis
        uses: ./.github/actions/test-and-coverage
        with:
          flutter-channel: stable
          minimum-coverage: 60
          sonar-token: ${{ secrets.SONAR_TOKEN }}

  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    needs: prepare_env
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download env artifact
        uses: actions/download-artifact@v4
        with:
          name: env
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
      - name: Get dependencies
        run: flutter pub get
      - name: Build web app
        run: flutter build web --release
      - name: Deploy to Firebase Hosting Preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROJECT_MINDEASE }}
          projectId: project-mindease
