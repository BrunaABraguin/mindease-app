name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.x'
        channel: 'stable'

    - name: Create .env file
      run: |
        cat << 'EOF' > .env
        # Firebase API Keys for CI
        FIREBASE_API_KEY_WEB=${{ secrets.FIREBASE_API_KEY_WEB }}
        FIREBASE_API_KEY_ANDROID=${{ secrets.FIREBASE_API_KEY_ANDROID }}
        FIREBASE_API_KEY_IOS=${{ secrets.FIREBASE_API_KEY_IOS }}

        # Firebase Project Configuration
        FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
        FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
        FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
        FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}

        # Firebase App IDs
        FIREBASE_APP_ID_WEB=${{ secrets.FIREBASE_APP_ID_WEB }}
        FIREBASE_APP_ID_ANDROID=${{ secrets.FIREBASE_APP_ID_ANDROID }}
        FIREBASE_APP_ID_IOS=${{ secrets.FIREBASE_APP_ID_IOS }}
        FIREBASE_APP_ID_WINDOWS=${{ secrets.FIREBASE_APP_ID_WINDOWS }}

        # Additional Firebase Configuration
        FIREBASE_MEASUREMENT_ID_WEB=${{ secrets.FIREBASE_MEASUREMENT_ID_WEB }}
        FIREBASE_MEASUREMENT_ID_WINDOWS=${{ secrets.FIREBASE_MEASUREMENT_ID_WINDOWS }}
        FIREBASE_IOS_CLIENT_ID=${{ secrets.FIREBASE_IOS_CLIENT_ID }}
        FIREBASE_IOS_BUNDLE_ID=${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
        EOF

    - name: Get dependencies
      run: flutter pub get

    - name: Verify formatting
      run: dart format --output=none --set-exit-if-changed .

    - name: Analyze project source
      run: dart analyze --fatal-warnings

    - name: Run tests
      run: flutter test

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    strategy:
      matrix:
        platform: [web, android]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.x'
        channel: 'stable'

    - name: Setup Java (for Android builds)
      if: matrix.platform == 'android'
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Create .env file
      run: |
        cat << 'EOF' > .env
        # Firebase API Keys for CI
        FIREBASE_API_KEY_WEB=${{ secrets.FIREBASE_API_KEY_WEB }}
        FIREBASE_API_KEY_ANDROID=${{ secrets.FIREBASE_API_KEY_ANDROID }}
        FIREBASE_API_KEY_IOS=${{ secrets.FIREBASE_API_KEY_IOS }}

        # Firebase Project Configuration
        FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
        FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
        FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
        FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}

        # Firebase App IDs
        FIREBASE_APP_ID_WEB=${{ secrets.FIREBASE_APP_ID_WEB }}
        FIREBASE_APP_ID_ANDROID=${{ secrets.FIREBASE_APP_ID_ANDROID }}
        FIREBASE_APP_ID_IOS=${{ secrets.FIREBASE_APP_ID_IOS }}
        FIREBASE_APP_ID_WINDOWS=${{ secrets.FIREBASE_APP_ID_WINDOWS }}

        # Additional Firebase Configuration
        FIREBASE_MEASUREMENT_ID_WEB=${{ secrets.FIREBASE_MEASUREMENT_ID_WEB }}
        FIREBASE_MEASUREMENT_ID_WINDOWS=${{ secrets.FIREBASE_MEASUREMENT_ID_WINDOWS }}
        FIREBASE_IOS_CLIENT_ID=${{ secrets.FIREBASE_IOS_CLIENT_ID }}
        FIREBASE_IOS_BUNDLE_ID=${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
        EOF

    - name: Get dependencies
      run: flutter pub get

    - name: Build Web
      if: matrix.platform == 'web'
      run: flutter build web --release

    - name: Build Android APK
      if: matrix.platform == 'android'
      run: flutter build apk --release

    - name: Upload Web Build Artifact
      if: matrix.platform == 'web'
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: build/web/

    - name: Upload Android APK Artifact
      if: matrix.platform == 'android'
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/app-release.apk