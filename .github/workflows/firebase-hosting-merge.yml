# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  prepare_env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create and upload env file
        uses: ./.github/actions/create-env
        with:
              FIREBASE_API_KEY_WEB: ${{ secrets.FIREBASE_API_KEY_WEB }}
              FIREBASE_API_KEY_ANDROID: ${{ secrets.FIREBASE_API_KEY_ANDROID }}
              FIREBASE_API_KEY_IOS: ${{ secrets.FIREBASE_API_KEY_IOS }}
              FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
              FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
              FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
              FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
              FIREBASE_APP_ID_WEB: ${{ secrets.FIREBASE_APP_ID_WEB }}
              FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
              FIREBASE_APP_ID_IOS: ${{ secrets.FIREBASE_APP_ID_IOS }}
              FIREBASE_APP_ID_WINDOWS: ${{ secrets.FIREBASE_APP_ID_WINDOWS }}
              FIREBASE_MEASUREMENT_ID_WEB: ${{ secrets.FIREBASE_MEASUREMENT_ID_WEB }}
              FIREBASE_MEASUREMENT_ID_WINDOWS: ${{ secrets.FIREBASE_MEASUREMENT_ID_WINDOWS }}
              FIREBASE_IOS_CLIENT_ID: ${{ secrets.FIREBASE_IOS_CLIENT_ID }}
              FIREBASE_IOS_BUNDLE_ID: ${{ secrets.FIREBASE_IOS_BUNDLE_ID }}
            
  test_and_quality:
    runs-on: ubuntu-latest
    needs: prepare_env
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      
      - name: Download env artifact
        uses: actions/download-artifact@v4
        with:
          name: env

      - name: Run Flutter tests and coverage analysis
        uses: ./.github/actions/test-and-coverage
        with:
          flutter-channel: stable
          minimum-coverage: 60
          sonar-token: ${{ secrets.SONAR_TOKEN }}
      
  build_and_deploy:
    runs-on: ubuntu-latest
    needs: prepare_env
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download env artifact
        uses: actions/download-artifact@v4
        with:
          name: env

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get

      - name: Build web app
        run: flutter build web --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROJECT_MINDEASE }}
          channelId: live
          projectId: project-mindease
